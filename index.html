<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deepen - Brainwave Audio Engine</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Deepen</h1>
            <p>Binaural Beats & Soundscapes</p>
        </header>

        <main>
            <div class="player-center">
                <button id="playBtn" class="play-button">
                    <span id="playIcon">START</span>
                </button>
            </div>

            <div class="controls">
                <div class="control-group">
                    <label for="brainwaveSlider">
                        뇌파 주파수 (Brainwave): <span id="brainwaveVal">10.0</span> Hz 
                        <span class="badge" id="brainwaveType">Alpha</span>
                    </label>
                    <input type="range" id="brainwaveSlider" min="0.5" max="40" step="0.5" value="10">
                    <div class="slider-labels">
                        <span>Delta</span>
                        <span>Theta</span>
                        <span>Alpha</span>
                        <span>Beta</span>
                        <span>Gamma</span>
                    </div>
                </div>

                <div class="control-group">
                    <label for="binauralVolume">바이노럴 비트 강도 (Intensity)</label>
                    <input type="range" id="binauralVolume" min="0" max="1" step="0.01" value="0.5">
                </div>

                <div class="control-group">
                    <label for="rainVolume">배경 빗소리 볼륨 (Rain Volume)</label>
                    <input type="range" id="rainVolume" min="0" max="1" step="0.01" value="0.5">
                </div>
            </div>
        </main>

        <footer>
            <h3>솔페지오 주파수 (Solfeggio Frequencies)</h3>
            <div class="toggles">
                <label class="toggle-switch">
                    <input type="checkbox" id="toggle432">
                    <span class="slider round"></span>
                    <span class="label-text">432 Hz</span>
                </label>
                <label class="toggle-switch">
                    <input type="checkbox" id="toggle528">
                    <span class="slider round"></span>
                    <span class="label-text">528 Hz</span>
                </label>
            </div>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
